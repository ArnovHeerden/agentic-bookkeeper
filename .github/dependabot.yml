version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Major bumps require manual review (peer-dep coordination, breaking
      # changes). Dependabot still opens minor + patch PRs which auto-merge
      # safely once CI is green.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Africa/Johannesburg
    commit-message:
      prefix: ci
      include: scope
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
