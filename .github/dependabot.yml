version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # @eslint/js v10 requires eslint v10; pinned to v9 to track the eslint major.
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Africa/Johannesburg
    commit-message:
      prefix: ci
      include: scope
